<section class="panel panel--narrow">
  <h1 class="panel__title">{{ 'listNew.title' | translate }}</h1>
  <p class="panel__lead">{{ 'listNew.lead' | translate }}</p>

  @if (submitError()) {
    <p class="panel__error" role="alert">{{ 'listNew.submitError' | translate }}</p>
  }

  <form class="form" [formGroup]="form" (ngSubmit)="submit()">
    <label class="form__label">
      <span class="form__text">{{ 'listNew.nameLabel' | translate }}</span>
      <div class="form__control">
        <input class="form__input" type="text" formControlName="name" autocomplete="off" />
        @if (submitAttempted() && form.controls.name.hasError('required')) {
          <p class="form__hint form__hint--error">{{ 'listNew.nameRequired' | translate }}</p>
        }
      </div>
    </label>
    <div class="form__actions">
      <button class="btn btn--primary" type="submit" [disabled]="submitting()">
        {{ submitting() ? ('listNew.creating' | translate) : ('listNew.create' | translate) }}
      </button>
      <a class="btn btn--ghost" routerLink="/lists">{{ 'listNew.cancel' | translate }}</a>
    </div>
  </form>
</section>
